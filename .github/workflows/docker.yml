name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and export for distribution
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: production
          outputs: type=docker,dest=/tmp/multimodal-rag.tar
          tags: multimodal-rag:${{ github.ref_name }}
      
      - name: Package for distribution
        run: |
          mkdir -p MultiModalRAG-Docker
          gzip /tmp/multimodal-rag.tar
          mv /tmp/multimodal-rag.tar.gz MultiModalRAG-Docker/
          cp docker-compose.yml MultiModalRAG-Docker/
          cp .env.example MultiModalRAG-Docker/
          tar -czf MultiModalRAG-Docker-${{ github.ref_name }}.tar.gz MultiModalRAG-Docker
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiModalRAG-Docker
          path: MultiModalRAG-Docker-*.tar.gz
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: MultiModalRAG-Docker-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}