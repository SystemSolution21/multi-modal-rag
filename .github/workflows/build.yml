name: Build Multi-Platform Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: |
          scripts\build.ps1

      - name: Package
        run: |
          scripts\package.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiModalRAG-Windows-x64
          path: MultiModalRAG-Windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Build and package
        run: |
          chmod +x scripts/build.sh scripts/package.sh
          scripts/build.sh
          scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiModalRAG-macOS
          path: MultiModalRAG-macOS-*.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Build and package
        run: |
          chmod +x scripts/build.sh scripts/package.sh
          scripts/build.sh
          scripts/package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiModalRAG-Linux
          path: MultiModalRAG-Linux-*.tar.gz

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            MultiModalRAG-Windows-x64/*.zip
            MultiModalRAG-macOS/*.tar.gz
            MultiModalRAG-Linux/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
